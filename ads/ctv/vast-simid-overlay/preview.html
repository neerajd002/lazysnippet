<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TV Simulator - SIMID Overlay Preview</title><style>body{background-color:#1a1a1a;color:#fff;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}.tv-bezel{background:#000;border:12px solid #333;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.8);position:relative}#mainContainer{width:1280px;height:720px;position:relative;background:#000;overflow:hidden}#contentElement{width:100%;height:100%;position:absolute;top:0;left:0}#adContainer{position:absolute;top:0;left:0;width:100%;height:100%}.controls{margin-top:30px;padding:20px;background:#2a2a2a;border-radius:8px;display:flex;gap:15px}button{padding:12px 24px;font-size:16px;background:#ff4081;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;transition:background .2s}button:hover{background:#ff79a1}</style><script type="text/javascript" src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script></head><body><h1>SIMID / CTV Automated Sandbox</h1><p>This simulates a 1280x720 TV viewport loading the local vast.xml payload over Google IMA.</p><div class="tv-bezel"><div id="mainContainer"><video id="contentElement"><source src="https://storage.googleapis.com/gvabox/media/samples/stock.mp4" type="video/mp4"></video><div id="adContainer"></div></div></div><div class="controls"><button id="playButton">Boot Simulated Environment</button></div><script type="text/javascript">const videoElement=document.getElementById("contentElement"),adContainerElement=document.getElementById("adContainer"),playButton=document.getElementById("playButton");let adDisplayContainer,adsLoader,adsManager;const VAST_TAG_URL=window.location.origin+"/vast.xml";function init(){adDisplayContainer=new google.ima.AdDisplayContainer(adContainerElement,videoElement),adsLoader=new google.ima.AdsLoader(adDisplayContainer),adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,onAdsManagerLoaded,!1),adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR,onAdError,!1),playButton.addEventListener("click",()=>{playButton.style.display="none",videoElement.load(),adDisplayContainer.initialize();const e=new google.ima.AdsRequest;e.adTagUrl=VAST_TAG_URL,e.linearAdSlotWidth=1280,e.linearAdSlotHeight=720,e.nonLinearAdSlotWidth=1280,e.nonLinearAdSlotHeight=720,console.log("Requesting Google IMA Ads from: ",VAST_TAG_URL),adsLoader.requestAds(e)})}function onAdsManagerLoaded(e){console.log("IMA AdsManager Loaded successfully");const a=new google.ima.AdsRenderingSettings;a.restoreCustomPlaybackStateOnAdBreakComplete=!0,adsManager=e.getAdsManager(videoElement,a);[google.ima.AdEvent.Type.LOADED,google.ima.AdEvent.Type.STARTED,google.ima.AdEvent.Type.COMPLETE].forEach(e=>{adsManager.addEventListener(e,e=>console.log("Google IMA State => "+e.type))}),adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR,onAdError);try{console.log("Executing simid-start bridge via AdManager initialization..."),adsManager.init(1280,720,google.ima.ViewMode.NORMAL),adsManager.start()}catch(e){console.error("Ad execution failed synchronously",e)}}function onAdError(e){console.error("Fatal IMA Error caught by sandbox:",e.getError()),adsManager&&adsManager.destroy()}init()</script></body></html>
